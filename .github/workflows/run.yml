name: Hourly Weather Run
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests
    - name: Run Script
      run: python script.py
    - name: Save Data
      run: |
        git config --global user.name 'WeatherBot'
        git config --global user.email 'bot@weather.com'
        git add weather_data.csv
        git commit -m "Hourly weather update" || exit 0
        git push
