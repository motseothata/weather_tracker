name: Hourly Weather Run
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually to test it
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests
    - name: Run Script
      run: python script.py
    - name: Save Data
      run: |
        git config --global user.name 'WeatherBot'
        git config --global user.email 'bot@weather.com'
        git add weather_data.csv
        git commit -m "Hourly weather update" || exit 0
        git push
